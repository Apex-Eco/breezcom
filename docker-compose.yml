services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iqair}
      POSTGRES_USER: ${POSTGRES_USER:-iqair_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zwNxu4QJzMc35yN2}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iqair_user} -d ${POSTGRES_DB:-iqair}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      # Override to use the internal Docker 'db' host and match backend/.env credentials
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://iqair_user:zwNxu4QJzMc35yN2@db:5432/iqair}
      DATABASE_NAME: ${DATABASE_NAME:-iqair}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* vars are baked into the client bundle at build time,
        # so they MUST be resolvable by the browser (not Docker-internal names).
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      DB_URL: ${DB_URL:-postgresql://iqair_user:zwNxu4QJzMc35yN2@db:5432/iqair}
      DATABASE_URL: ${DATABASE_URL:-postgresql://iqair_user:zwNxu4QJzMc35yN2@db:5432/iqair}
      TYNYS_DB_URL: ${TYNYS_DB_URL:-postgresql://iqair_user:zwNxu4QJzMc35yN2@db:5432/iqair}
      TYNYS_DB_HOST: ${TYNYS_DB_HOST:-db}
      TYNYS_DB_PORT: ${TYNYS_DB_PORT:-5432}
      TYNYS_DB_USER: ${TYNYS_DB_USER:-iqair_user}
      TYNYS_DB_PASSWORD: ${TYNYS_DB_PASSWORD:-zwNxu4QJzMc35yN2}
      TYNYS_DB_NAME: ${TYNYS_DB_NAME:-iqair}
    depends_on:
      - backend
    # Map frontend container port 3000 to host port 3000
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
